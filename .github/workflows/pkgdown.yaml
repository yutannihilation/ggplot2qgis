# Build the pkgdown site and deploy it to GitHub Pages via the
# "GitHub Actions" Pages source (no gh-pages branch).
# NOTE: enable Pages once under Settings > Pages > Source: GitHub Actions.
name: pkgdown

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pkgdown-site

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v5
